name: Schedule social posts

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'docs/blog/**'

permissions:
  pull-requests: write
  contents: read
  id-token: write

jobs:
  schedule-social:
    name: Generate and schedule social posts
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find blog post
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # Find .md files added/modified in docs/blog/ (excluding index.md)
          # Pick the one with most additions — that's the new post, not index edits
          BLOG_FILE=$(gh pr view "$PR_NUMBER" --json files \
            --jq '.files[] | select(.path | test("^docs/blog/.+\\.md$")) | select(.path | test("index\\.md") | not) | "\(.additions) \(.path)"' \
            | sort -rn | head -1 | awk '{print $2}')

          if [ -z "$BLOG_FILE" ]; then
            echo "No blog post file found in this PR — skipping social scheduling."
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "found=true" >> $GITHUB_OUTPUT
          echo "file=$BLOG_FILE" >> $GITHUB_OUTPUT

          SLUG=$(basename "$BLOG_FILE" .md)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "url=https://www.bancs.no/blog/$SLUG" >> $GITHUB_OUTPUT
          echo "Blog post found: $BLOG_FILE (slug: $SLUG)"

      - name: Parse frontmatter
        if: steps.find.outputs.found == 'true'
        id: parse
        env:
          BLOG_FILE: ${{ steps.find.outputs.file }}
        run: |
          python3 << 'PYEOF'
          import yaml, re, os, sys

          blog_file = os.environ['BLOG_FILE']
          github_output = os.environ['GITHUB_OUTPUT']

          with open(blog_file, 'r') as f:
              raw = f.read()

          # Split on frontmatter delimiters
          parts = raw.split('---\n', 2)
          if len(parts) < 3:
              print("ERROR: No frontmatter found", file=sys.stderr)
              sys.exit(1)

          fm = yaml.safe_load(parts[1])
          content = parts[2]

          # Basic fields
          title = fm.get('title', '')
          date = str(fm.get('socialDate') or fm.get('date', ''))  # socialDate takes precedence (#213)
          subtitle = fm.get('subtitle', '')

          # Skip if social date is in the past
          import datetime
          if date and datetime.date.fromisoformat(date) < datetime.date.today():
              print(f'Social date {date} is in the past — skipping.')
              with open(github_output, 'a') as out:
                  out.write('found=false\n')
              sys.exit(0)

          # Hero fields
          hero = fm.get('hero', {}) or {}
          hero_attribution = (hero.get('attribution') or {}).get('author', '')

          # relatedArticles — future feature, parsed now so the field is supported
          related = fm.get('relatedArticles', []) or []
          related_links = '\n'.join(
              f"* {a.get('title', '')}: https://www.bancs.no{a.get('url', '')}"
              for a in related if a.get('title') and a.get('url')
          )

          # SeriesNav — parse prev/next from Vue component in content
          prev_title = prev_url = next_title = next_url = ''
          nav_match = re.search(r'<SeriesNav([^/]*)/>', content, re.DOTALL)
          if nav_match:
              nav_str = nav_match.group(1)
              prev_m = re.search(r':prev="[^"]*text:\s*[\'"](.+?)[\'"][^"]*link:\s*[\'"](.+?)[\'"]', nav_str)
              next_m = re.search(r':next="[^"]*text:\s*[\'"](.+?)[\'"][^"]*link:\s*[\'"](.+?)[\'"]', nav_str)
              if prev_m:
                  prev_title, prev_url = prev_m.group(1), 'https://www.bancs.no' + prev_m.group(2)
              if next_m:
                  next_title, next_url = next_m.group(1), 'https://www.bancs.no' + next_m.group(2)

          # Clean content for Claude: strip Vue components and leading attribution lines
          clean = re.sub(r'<[A-Z][^\n>]*/>', '', content)           # self-closing Vue components
          clean = re.sub(r'<[A-Z][^>]*>.*?</[A-Z][^>]*>', '', clean, flags=re.DOTALL)  # block components
          clean = clean.strip()

          # Write outputs
          # Hero image path — resolve URL to filesystem path for carousel generation
          hero_image_url  = (hero.get('image') or '')
          hero_image_path = ('docs/public' + hero_image_url) if hero_image_url.startswith('/') else ''

          tags = fm.get('tags', []) or []
          tags_str = ', '.join(tags)

          with open(github_output, 'a') as out:
              out.write(f"title={title}\n")
              out.write(f"date={date}\n")
              out.write(f"subtitle={subtitle}\n")
              out.write(f"hero_attribution={hero_attribution}\n")
              out.write(f"hero_image_path={hero_image_path}\n")
              out.write(f"tags={tags_str}\n")
              out.write(f"prev_title={prev_title}\n")
              out.write(f"prev_url={prev_url}\n")
              out.write(f"next_title={next_title}\n")
              out.write(f"next_url={next_url}\n")
              out.write(f"has_related={'true' if related_links else 'false'}\n")

          with open('/tmp/post_content.md', 'w') as f:
              f.write(clean)

          with open('/tmp/related_links.txt', 'w') as f:
              f.write(related_links)

          print(f"Parsed: {title!r} ({date})")
          PYEOF

      - name: Prepare social content prompt
        if: steps.find.outputs.found == 'true'
        id: social_prompt
        env:
          TITLE: ${{ steps.parse.outputs.title }}
          DATE: ${{ steps.parse.outputs.date }}
          URL: ${{ steps.find.outputs.url }}
        run: |
          content=$(envsubst < scripts/prompts/social-content.txt)
          echo "content<<PROMPT_EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "PROMPT_EOF" >> $GITHUB_OUTPUT

      - name: Generate social content via Claude
        if: steps.find.outputs.found == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write,Bash"
          show_full_output: ${{ vars.CLAUDE_DEBUG || 'false' }}
          prompt: ${{ steps.social_prompt.outputs.content }}

      - name: Validate Claude output
        if: steps.find.outputs.found == 'true'
        run: |
          if [ ! -f /tmp/claude-output.json ]; then
            echo "Claude did not write /tmp/claude-output.json"
            exit 1
          fi

          jq -e '.linkedin_body and .twitter and .instagram_body and (.instagram_hashtags | type == "array")' /tmp/claude-output.json > /dev/null \
            || { echo "Unexpected JSON structure in Claude output"; cat /tmp/claude-output.json; exit 1; }

          echo "Claude output validated successfully"

      - name: Assemble LinkedIn post
        if: steps.find.outputs.found == 'true'
        env:
          POST_URL: ${{ steps.find.outputs.url }}
          PREV_TITLE: ${{ steps.parse.outputs.prev_title }}
          PREV_URL: ${{ steps.parse.outputs.prev_url }}
          NEXT_TITLE: ${{ steps.parse.outputs.next_title }}
          NEXT_URL: ${{ steps.parse.outputs.next_url }}
          HAS_RELATED: ${{ steps.parse.outputs.has_related }}
        run: |
          python3 << 'PYEOF'
          import os, json

          with open('/tmp/claude-output.json') as f:
              claude_out = json.load(f)

          body    = claude_out['linkedin_body'].strip()
          hashtags = ' '.join(f"#{tag.lstrip('#')}" for tag in claude_out['instagram_hashtags'])

          prev_title = os.environ.get('PREV_TITLE', '')
          prev_url   = os.environ.get('PREV_URL', '')
          next_title = os.environ.get('NEXT_TITLE', '')
          next_url   = os.environ.get('NEXT_URL', '')
          has_related = os.environ.get('HAS_RELATED', 'false') == 'true'

          parts = [body]

          # Series links (from SeriesNav)
          series_links = []
          if prev_title and prev_url:
              series_links.append(f"* {prev_title}: {prev_url}")
          if next_title and next_url:
              series_links.append(f"* {next_title}: {next_url}")
          if series_links:
              parts.append('Catch up on the series:\n\n' + '\n'.join(series_links))

          # Related articles (from relatedArticles frontmatter)
          if has_related:
              with open('/tmp/related_links.txt') as f:
                  related = f.read().strip()
              if related:
                  parts.append('Did you like this topic? Read more about it in these articles:\n\n' + related)

          parts.append(hashtags)

          full_post = '\n\n'.join(parts)

          with open('/tmp/linkedin_post.txt', 'w') as f:
              f.write(full_post)

          print(f"LinkedIn post assembled ({len(full_post)} chars)")
          PYEOF

      - name: Set up Node.js for carousel generation
        if: steps.find.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        if: steps.find.outputs.found == 'true'
        run: npm ci

      - name: Prepare carousel slides prompt
        if: steps.find.outputs.found == 'true'
        id: carousel_prompt
        env:
          TITLE: ${{ steps.parse.outputs.title }}
          URL: ${{ steps.find.outputs.url }}
          HERO_ATTRIBUTION: ${{ steps.parse.outputs.hero_attribution }}
          TAGS: ${{ steps.parse.outputs.tags }}
        run: |
          content=$(envsubst < scripts/prompts/carousel-slides.txt)
          echo "content<<PROMPT_EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "PROMPT_EOF" >> $GITHUB_OUTPUT

      - name: Generate carousel slides via Claude
        if: steps.find.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Read,Write"
          show_full_output: ${{ vars.CLAUDE_DEBUG || 'false' }}
          prompt: ${{ steps.carousel_prompt.outputs.content }}

      - name: Validate carousel slides
        if: steps.find.outputs.found == 'true'
        run: |
          if [ ! -f /tmp/carousel-slides.json ]; then
            echo "Claude did not write /tmp/carousel-slides.json"
            exit 1
          fi

          jq -e '.template and .head and (.pages | length > 0) and .tail' /tmp/carousel-slides.json > /dev/null \
            || { echo "Unexpected JSON structure in carousel slides"; cat /tmp/carousel-slides.json; exit 1; }

          echo "Carousel slides validated ($(jq '.pages | length' /tmp/carousel-slides.json) content pages)"

      - name: Generate carousel PDF
        if: steps.find.outputs.found == 'true'
        env:
          HERO_IMAGE_PATH: ${{ steps.parse.outputs.hero_image_path }}
        run: npx tsx scripts/carousel/generate.ts

      - name: Schedule via Publer
        if: steps.find.outputs.found == 'true'
        id: publer
        env:
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
          PUBLER_LINKEDIN_ACCOUNT_ID: ${{ secrets.PUBLER_LINKEDIN_ACCOUNT_ID }}
          PUBLER_TWITTER_ACCOUNT_ID: ${{ secrets.PUBLER_TWITTER_ACCOUNT_ID }}
          PUBLER_INSTAGRAM_ACCOUNT_ID: ${{ secrets.PUBLER_INSTAGRAM_ACCOUNT_ID }}
          POST_DATE: ${{ steps.parse.outputs.date }}
          POST_URL: ${{ steps.find.outputs.url }}
          POST_TITLE: ${{ steps.parse.outputs.title }}
        run: |
          python3 << 'PYEOF'
          import os, json, time, urllib.request, urllib.error, subprocess, datetime
          from pathlib import Path

          api_key      = os.environ['PUBLER_API_KEY']
          workspace_id = os.environ['PUBLER_WORKSPACE_ID']
          post_date    = os.environ['POST_DATE']
          post_url     = os.environ['POST_URL']
          post_title   = os.environ['POST_TITLE']

          HEADERS = {
              'Authorization': f'Bearer-API {api_key}',
              'Publer-Workspace-Id': workspace_id,
              'Content-Type': 'application/json',
              'User-Agent': 'Mozilla/5.0 (compatible; bancs-social-bot/1.0)',
          }

          # 09:00 Europe/Oslo — calculate UTC offset (CET=+01:00, CEST=+02:00)
          social_date = datetime.date.fromisoformat(post_date)
          is_future = social_date > datetime.date.today()

          if is_future:
              tz_offset = subprocess.run(
                  ['date', '-d', f'{post_date} 09:00:00', '+%z'],
                  env={**os.environ, 'TZ': 'Europe/Oslo'}, capture_output=True, text=True
              ).stdout.strip()
              scheduled_at = f'{post_date}T09:00:00{tz_offset[:3]}:{tz_offset[3:]}'
          else:
              # Schedule 30 minutes from now — gives time to review before it goes out
              now_plus_30 = datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(minutes=30)
              scheduled_at = now_plus_30.strftime('%Y-%m-%dT%H:%M:%S+00:00')

          # ── Upload PDF carousel ───────────────────────────────────────────────

          print('Uploading PDF carousel...')
          pdf_bytes = Path('/tmp/carousel.pdf').read_bytes()
          boundary  = '----FormBoundary7MA4YWxkTrZu0gW'
          body = (
              f'--{boundary}\r\n'
              f'Content-Disposition: form-data; name="file"; filename="carousel.pdf"\r\n'
              f'Content-Type: application/pdf\r\n\r\n'
          ).encode() + pdf_bytes + (
              f'\r\n--{boundary}\r\n'
              f'Content-Disposition: form-data; name="in_library"\r\n\r\n'
              f'true'
              f'\r\n--{boundary}--\r\n'
          ).encode()

          upload_req = urllib.request.Request(
              'https://app.publer.com/api/v1/media',
              data=body,
              headers={
                  'Authorization': f'Bearer-API {api_key}',
                  'Publer-Workspace-Id': workspace_id,
                  'User-Agent': 'Mozilla/5.0 (compatible; bancs-social-bot/1.0)',
                  'Content-Type': f'multipart/form-data; boundary={boundary}',
              }
          )
          try:
              with urllib.request.urlopen(upload_req) as resp:
                  upload_result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              raise SystemExit(f'PDF upload failed — {e.code}: {e.read().decode()}')

          # PDF uploads are async — poll job_id to get slide image IDs
          media_ids = []
          upload_job_id = upload_result.get('job_id')

          if upload_job_id:
              print(f'  Processing (job_id: {upload_job_id}) — polling...')
              poll_req = urllib.request.Request(
                  f'https://app.publer.com/api/v1/job_status/{upload_job_id}',
                  headers=HEADERS,
              )
              for attempt in range(15):
                  time.sleep(3)
                  try:
                      with urllib.request.urlopen(poll_req) as resp:
                          poll = json.loads(resp.read())
                          if poll.get('status') == 'complete':
                              media_ids = [item['id'] for item in poll.get('data', [])]
                              print(f'  Complete — {len(media_ids)} slides: {media_ids}')
                              break
                          else:
                              print(f'  [{attempt + 1}/15] status: {poll.get("status")}')
                  except urllib.error.HTTPError as e:
                      print(f'  [{attempt + 1}/15] poll error — {e.code}')
              else:
                  raise SystemExit('Timed out waiting for PDF processing.')
          else:
              media_ids = [upload_result['id']]
              print(f'  Uploaded — id: {media_ids[0]}')

          if not media_ids:
              raise SystemExit('No slide IDs returned from Publer — cannot schedule.')

          slide_media = [{'id': mid, 'type': 'photo'} for mid in media_ids]

          # ── Schedule posts ────────────────────────────────────────────────────

          with open('/tmp/linkedin_post.txt') as f:
              linkedin_text = f.read()
          twitter_text = json.loads(Path('/tmp/claude-output.json').read_text())['twitter'] + ' ' + post_url
          claude_out = json.loads(Path('/tmp/claude-output.json').read_text())
          instagram_text = claude_out['instagram_body'].strip() + '\n\n' + '\n'.join(
              f"#{tag.lstrip('#')}" for tag in claude_out['instagram_hashtags']
          )

          def schedule(label, account_id, platform, network_payload):
              payload = json.dumps({
                  'bulk': {
                      'state': 'scheduled',
                      'posts': [{'accounts': [{'id': account_id, 'scheduled_at': scheduled_at}],
                                 'networks': {platform: network_payload}}]
                  }
              }).encode()
              req = urllib.request.Request(
                  'https://app.publer.com/api/v1/posts/schedule',
                  data=payload, headers=HEADERS,
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read())
                      print(f'{label}: submitted (job_id: {result.get("job_id", "?")})')
                      return True
              except urllib.error.HTTPError as e:
                  print(f'{label}: failed — {e.read().decode()}')
                  return False

          print('Scheduling posts...')
          linkedin_ok  = schedule('LinkedIn',  os.environ['PUBLER_LINKEDIN_ACCOUNT_ID'],  'linkedin', {
              'type': 'photo', 'title': post_title, 'text': linkedin_text, 'media': slide_media,
          })
          instagram_ok = schedule('Instagram', os.environ['PUBLER_INSTAGRAM_ACCOUNT_ID'], 'instagram', {
              'type': 'photo', 'text': instagram_text, 'media': slide_media,
          })
          twitter_ok   = schedule('Twitter/X', os.environ['PUBLER_TWITTER_ACCOUNT_ID'],   'twitter', {
              'type': 'status', 'text': twitter_text,
          })

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'linkedin_ok={"true" if linkedin_ok else "false"}\n')
              f.write(f'instagram_ok={"true" if instagram_ok else "false"}\n')
              f.write(f'twitter_ok={"true" if twitter_ok else "false"}\n')

          if not any([linkedin_ok, instagram_ok, twitter_ok]):
              raise SystemExit('All Publer API calls failed')
          PYEOF

      - name: Post PR comment
        if: steps.find.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          POST_TITLE: ${{ steps.parse.outputs.title }}
          POST_DATE: ${{ steps.parse.outputs.date }}
          LINKEDIN_OK: ${{ steps.publer.outputs.linkedin_ok }}
          INSTAGRAM_OK: ${{ steps.publer.outputs.instagram_ok }}
          TWITTER_OK: ${{ steps.publer.outputs.twitter_ok }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 << 'PYEOF'
          import os, subprocess, datetime

          date = os.environ['POST_DATE']
          title = os.environ['POST_TITLE']
          is_future = datetime.date.fromisoformat(date) > datetime.date.today()

          if is_future:
              scheduled = subprocess.run(
                  ['date', '-d', f'{date} 09:00:00', '+%A %B %-d, %Y at 09:00 CET'],
                  env={**os.environ, 'TZ': 'Europe/Oslo'},
                  capture_output=True, text=True
              ).stdout.strip()
              heading = f'## Scheduled for {scheduled}'
          else:
              now_plus_30 = datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(minutes=30)
              heading = f'## Scheduled for today at {now_plus_30.strftime("%H:%M")} UTC (~30 min from now)'

          def status(val):
              return '✅' if val == 'true' else '❌'

          lines = [
              heading,
              '',
              f'**{title}**',
              '',
              '| Platform | Status | Format |',
              '|----------|--------|--------|',
              f'| LinkedIn  | {status(os.environ["LINKEDIN_OK"])}  | PDF carousel |',
              f'| Instagram | {status(os.environ["INSTAGRAM_OK"])} | PDF carousel |',
              f'| Twitter/X | {status(os.environ["TWITTER_OK"])}  | Text |',
              '',
              '_Generated by Claude Sonnet 4.6, scheduled via Publer._',
          ]

          with open('/tmp/pr_comment.md', 'w') as f:
              f.write('\n'.join(lines))
          PYEOF

          gh pr comment "$PR_NUMBER" --body-file /tmp/pr_comment.md
